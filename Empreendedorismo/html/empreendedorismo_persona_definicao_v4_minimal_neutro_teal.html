<!DOCTYPE html>

<title>Persona Definição</title>
<style>
@page { size: A4; margin: 20mm 15mm 25mm 15mm; }
@media print { body { margin: 0; padding: 0; } input, textarea { border: none !important; border-bottom: 1px solid #ccc !important; background: transparent !important; } }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1e293b; background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.page { width: 210mm; min-height: 297mm; padding: 20mm 15mm 25mm 15mm; position: relative; overflow: hidden; }
.footer { position: absolute; bottom: 10mm; left: 15mm; right: 15mm; text-align: center; font-size: 7pt; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 4mm; }
.footer a { color: #64748b; text-decoration: none; }
.footer a:hover { color: #1a365d; }
h1 { font-size: 28pt; font-weight: 700; color: #1a365d; margin-bottom: 12px; line-height: 1.2; }
h2 { font-size: 22pt; font-weight: 600; color: #1a365d; margin-bottom: 8px; line-height: 1.3; }
h3 { font-size: 18pt; font-weight: 600; color: #475569; margin-bottom: 8px; }
h4 { font-size: 14pt; font-weight: 600; color: #475569; margin-bottom: 8px; }
p { font-size: 10pt; line-height: 1.6; margin-bottom: 8px; color: #1e293b; }
table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
th, td { border: 1px solid #e2e8f0; padding: 4px 6px; text-align: left; font-size: 10pt; }
th { background: #1a365d; color: white; font-weight: 600; }
tr:nth-child(even) { background: #f8fafc; }
input, textarea { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10pt; color: #1e293b; border: none; border-bottom: 1px solid #e2e8f0; background: transparent; width: 100%; outline: none; padding: 2px 0; }
input:focus, textarea:focus { border-bottom-color: #0d9488; }
input[type="checkbox"] { width: 16px; height: 16px; margin-right: 6px; cursor: pointer; accent-color: #1a365d; border: 2px solid #e2e8f0; }
input[type="text"] { }
.input-line { border-bottom: 1px solid #e2e8f0; padding: 4px 0; margin-bottom: 6px; }
textarea { border: 1px solid #e2e8f0; border-radius: 4px; resize: vertical; min-height: 60px; padding: 6px; width: 100%; background: transparent; }
.chk-label { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 10pt; cursor: pointer; }
.chk-label input[type="checkbox"] { flex-shrink: 0; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 8pt; background: #f8fafc; color: #475569; }
.header-bar { width: 100%; height: 4px; background: linear-gradient(90deg, #1a365d, #0d9488); margin-bottom: 16px; border-radius: 2px; }
.tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 7pt; background: #e2e8f0; margin: 1px; }
.grid { display: grid; gap: 8px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.card { border: 1px solid #e2e8f0; border-radius: 4px; padding: 12px; margin-bottom: 8px; background: #fff; }
.card-title { font-weight: 600; font-size: 10pt; margin-bottom: 4px; color: #1a365d; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.dot-primary { background: #1a365d; }
.dot-accent { background: #0d9488; }
.dot-success { background: #16a34a; }
.dot-warning { background: #d97706; }
.dot-danger { background: #dc2626; }
.progress { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin: 4px 0; }
.progress-bar { height: 100%; border-radius: 3px; background: #0d9488; }
.day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.day-cell { border: 1px solid #e2e8f0; padding: 4px; text-align: center; font-size: 8pt; min-height: 30px; }
.day-cell.header { background: #1a365d; color: white; font-weight: 600; border-color: #1a365d; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
.mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.flex { display: flex; } .flex-between { display: flex; justify-content: space-between; align-items: center; }
.text-center { text-align: center; } .text-light { color: #64748b; } .font-bold { font-weight: 600; }
:root { --primary: #134e4a; --accent: #14b8a6; }

</style>
</head>
